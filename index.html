<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Libre Activo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Importamos una fuente Mono más pesada para los títulos */
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        
        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #000000;
            color: #ffffff;
        }

        .yellow-text { color: #ffff00; } 
        
        .repo-item {
            border-bottom: 1px solid #1a1a1a;
            padding: 1.5rem 0;
        }

        .repo-title {
            font-size: 1.25rem;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
        }

        .repo-title:hover {
            color: #ffff00;
        }

        /* El punto azul/celeste que suele aparecer en esos estilos */
        .dot { color: #00ffff; }

        /* Estilo de la licencia al pie */
        .copyleft {
            font-size: 0.85rem;
            margin-top: 4rem;
            border-top: 1px solid #333;
            padding-top: 2rem;
        }
    </style>
</head>
<body class="p-8 md:p-20 max-w-4xl">

    <header class="mb-16">
        <h1 class="text-3xl font-bold mb-4 uppercase tracking-tighter italic">
            # MODO LIBRE ACTIVO
        </h1>
        <nav class="text-lg">
            <span class="yellow-text">[</span>
            <a href="./neipfs.m3u" class="hover:underline">La elegancia de compartir.</a>
            <span class="yellow-text">]</span>
        </nav>
    </header>

    <main id="repos-container">
        <p class="animate-pulse yellow-text">Estableciendo conexión con el servidor...</p>
    </main>

    <footer class="copyleft">
        <p>© Licencia <span class="yellow-text font-bold">Copyleft</span></p>
    </footer>

    <script>
        const GITHUB_USER = 'ludivor'; // <--- Pon tu nombre de usuario aquí

        async function loadRepos() {
            try {
                const res = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?sort=updated&per_page=50`);
                const repos = await res.json();
                const container = document.getElementById('repos-container');
                container.innerHTML = '';

                repos.forEach(repo => {
                    if (!repo.fork) {
                        const div = document.createElement('div');
                        div.className = 'repo-item';
                        div.innerHTML = `
                            <div class="mb-1">
                                <span class="yellow-text mr-2">./</span>
                                <a href="${repo.html_url}" target="_blank" class="repo-title">
                                    ${repo.name}
                                </a>
                            </div>
                            <p class="text-zinc-500 text-sm italic ml-6">
                                ${repo.description || 'Sin descripción disponible'}
                            </p>
                            <div class="ml-6 mt-2 text-[10px] uppercase tracking-widest text-zinc-700">
                                Language: <span class="text-zinc-400">${repo.language || 'Binary'}</span> 
                                <span class="mx-2">|</span> 
                                Stars: <span class="text-zinc-400">${repo.stargazers_count}</span>
                            </div>
                        `;
                        container.appendChild(div);
                    }
                });
            } catch (e) {
                document.getElementById('repos-container').innerHTML = '<span class="text-red-600">ERROR_LOG: FALLO_DE_SISTEMA</span>';
            }
        }

        loadRepos();
    </script>
</body>
</html>
