<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Libre - Repositorios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; }
        .glitch-link:hover { color: #00ff00; text-decoration: underline; }
    </style>
</head>
<body class="bg-black text-gray-300 min-h-screen p-8 md:p-24">

    <div class="max-w-2xl mx-auto">
        <header class="mb-12 border-b border-gray-800 pb-6">
            <h1 class="text-2xl font-bold text-white mb-2"># MODO LIBRE ACTIVO</h1>
            <p class="text-sm italic opacity-70">La elegancia de compartir.</p>
        </header>

        <main>
            <div id="repos-list" class="space-y-4">
                <p class="animate-pulse">Consultando terminal...</p>
            </div>
        </main>

        <footer class="mt-20 pt-8 border-t border-gray-800 text-xs opacity-50">
            <p>© Licencia Copyleft - <a href="./LICENSE" class="underline">Ver términos</a></p>
        </footer>
    </div>

    <script>
        const USERNAME = 'ludivor'; // <--- TU NOMBRE DE GITHUB

        async function fetchRepos() {
            try {
                const response = await fetch(`https://api.github.com/users/${USERNAME}/repos?sort=updated&per_page=20`);
                const repos = await response.json();
                
                const list = document.getElementById('repos-list');
                list.innerHTML = '';

                repos.forEach(repo => {
                    if (!repo.fork) {
                        const item = `
                            <div class="group">
                                <span class="text-gray-600 mr-2">></span>
                                <a href="${repo.html_url}" target="_blank" class="glitch-link transition-colors uppercase tracking-widest text-sm">
                                    ${repo.name}
                                </a>
                                <span class="block text-xs text-gray-600 ml-5 mt-1">
                                    [${repo.language || 'DATA'}] - ${repo.description || 'SIN DESCRIPCIÓN'}
                                </span>
                            </div>
                        `;
                        list.innerHTML += item;
                    }
                });
            } catch (error) {
                list.innerHTML = '<p class="text-red-500">Error de conexión con el núcleo.</p>';
            }
        }
        fetchRepos();
    </script>
</body>
</html>
